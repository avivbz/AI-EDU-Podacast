name: Build podcast episode

# Runs whenever a new/updated Markdown digest is pushed to input/, on a weekly
# cron, and on manual dispatch. Generates the episode MP3, updates feed.xml, and
# commits both back to the repo so GitHub Pages serves the updated feed.
on:
  push:
    branches: [main]
    paths:
      - "input/**.md"
  schedule:
    # Every Monday at 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

# Allow the workflow to push the generated MP3 + feed.xml back to the repo.
permissions:
  contents: write

concurrency:
  group: build-podcast
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pydub python-dotenv

      - name: Generate episode and update feed
        env:
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
        run: python generate_podcast.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add episodes/ feed.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            EP=$(date -u +%Y-%m-%d)
            git commit -m "Add podcast episode and update feed (${EP})"
            git push
          fi
